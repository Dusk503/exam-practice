<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>大学英语(3)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333;padding-bottom:80px}
.header{background:linear-gradient(135deg,#27ae60,#1e8449);color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:center;gap:12px}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;position:absolute;left:12px;top:10px;text-decoration:none}
.back-btn:active{background:rgba(255,255,255,.35)}
.header h1{font-size:17px;font-weight:600}
.header .stats{font-size:12px;margin-top:3px;opacity:.85}
.toolbar{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap}
.toolbar select,.toolbar button{padding:7px 11px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;cursor:pointer}
.toolbar button{background:#27ae60;color:#fff;border:none;font-weight:500}
.toolbar button.active{background:#e74c3c}
.toolbar button.mode-btn{background:#666}
.toolbar button.mode-btn.exam-mode{background:#e67e22}
#question-area{padding:14px}
.q-card{background:#fff;border-radius:10px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.q-meta{font-size:12px;color:#999;margin-bottom:8px}
.q-text{font-size:15px;line-height:1.6;font-weight:500;margin-bottom:14px}
.q-options{display:flex;flex-direction:column;gap:7px}
.q-option{display:flex;align-items:center;gap:10px;padding:11px 13px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.4}
.q-option:hover{border-color:#27ae60;background:#f0faf5}
.q-option.correct{border-color:#27ae60;background:#eafaf1;color:#27ae60}
.q-option.wrong{border-color:#e74c3c;background:#fdedec;color:#e74c3c}
.q-option.disabled{pointer-events:none;opacity:.7}
.q-option .label{font-weight:600;min-width:22px}
.q-option.multi-correct{border-color:#27ae60;background:#eafaf1}
.q-btn{width:100%;padding:13px;margin-top:11px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.q-btn.submit{background:#27ae60;color:#fff}
.q-btn.next{background:#1e8449;color:#fff}
.q-btn.next-auto{background:#1e8449;color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.q-btn.return-btn{background:#999;color:#fff}
.q-result{padding:11px;margin-top:11px;border-radius:8px;font-size:14px;line-height:1.5;display:none}
.q-result.show{display:block}
.q-result.correct{background:#eafaf1;color:#27ae60;border:1px solid #27ae60}
.q-result.wrong{background:#fdedec;color:#e74c3c;border:1px solid #e74c3c}
.empty-state{text-align:center;padding:60px 20px;color:#999;font-size:15px}
.progress-bar{height:3px;background:#e0e0e0;position:sticky;top:52px;z-index:99}
.progress-fill{height:100%;background:#27ae60;transition:width .3s;border-radius:0 2px 2px 0}
.score-card{background:linear-gradient(135deg,#1e8449,#27ae60);color:#fff;border-radius:14px;padding:32px 24px;text-align:center;margin:20px 0}
.score-card .score-num{font-size:48px;font-weight:700}
.score-card .score-label{font-size:15px;opacity:.85;margin-top:4px}
.score-card .score-detail{font-size:13px;opacity:.7;margin-top:8px}
.exam-timer{font-size:13px;color:#fff;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;margin-left:8px;white-space:nowrap}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">‹</a>
  <div class="header-top">
    <div><h1>📖 大学英语(3) 期末复习</h1>
    <div class="stats" id="header-stats">加载中...</div></div>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<div class="toolbar">
  <select id="chapter-filter"><option value="">全部题型</option></select>
  <select id="mode-select"><option value="shuati">📝 刷题模式</option><option value="exam">📋 考试模式</option></select>
  <button onclick="toggleWrongBook()" id="wb-btn">📕 错题本</button>
</div>

<div id="question-area"></div>

<script src="en-questions.js"></script>
<script>
// ========= 考试配置 =========
const EXAM_CONFIG = {
  parts: [
    { type: '单选', chFilter: ch => ch === '词汇语法', count: 10, scorePer: 2, label: '词汇语法' },
    { type: '单选', chFilter: ch => ch && ch.startsWith('完形填空'), count: 10, scorePer: 2, label: '完形填空' },
    { chFilter: ch => ch && ch.startsWith('阅读理解'), count: 10, scorePer: 2, label: '阅读理解' },
    { type: '单选', chFilter: ch => ch === '句子翻译', count: 5, scorePer: 2, label: '句子翻译' }
  ],
  timeMinutes: 60,
  totalScore: 70
};

// ========= 状态 =========
let questions = [];
let currentIndex = 0;
let wrongIds = JSON.parse(localStorage.getItem('enWrongIds') || '[]');
let wrongMode = false;
let examMode = false;
let examAnswers = [];
let timerInterval = null;
let examStartTime = null;

const QS = typeof EN_QUESTIONS !== 'undefined' ? EN_QUESTIONS : [];

function init() {
  const chapters = [...new Set(QS.map(q=>q.chapter))].filter(Boolean);
  const sel = document.getElementById('chapter-filter');
  chapters.forEach(ch=>{const o=document.createElement('option');o.value=ch;o.textContent=ch;sel.appendChild(o)});
  loadQuestions();
}

function loadQuestions() {
  stopTimer();
  const isExam = document.getElementById('mode-select').value === 'exam';

  if (isExam) {
    examMode = true;
    generateExam();
    return;
  }

  examMode = false;
  let pool = [...QS];
  const ch = document.getElementById('chapter-filter').value;
  if(ch) pool = pool.filter(q=>q.chapter===ch);
  if(wrongMode) pool = pool.filter(q=>wrongIds.includes(q.id));
  questions = [...pool];
  shuffle(questions);
  currentIndex = 0;
  render();
}

function generateExam() {
  examMode = true;
  examAnswers = [];
  questions = [];

  EXAM_CONFIG.parts.forEach(part => {
    let pool = QS.filter(q => {
      if (part.chFilter) return part.chFilter(q.chapter);
      if (part.type) return q.type === part.type;
      return true;
    });
    shuffle(pool);
    const selected = pool.slice(0, Math.min(part.count, pool.length));
    selected.forEach(q => {
      questions.push({ ...q, _examScore: part.scorePer, _examLabel: part.label });
    });
  });

  shuffle(questions);

  if (questions.length === 0) {
    document.getElementById('question-area').innerHTML = '<div class="empty-state">❌ 无法生成试卷（题库不足）</div>';
    document.getElementById('progress-fill').style.width = '0%';
    return;
  }

  currentIndex = 0;
  startTimer();
  render();
}

function startTimer() {
  stopTimer();
  examStartTime = Date.now();
  updateTimer();
  timerInterval = setInterval(updateTimer, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimer() {
  if (!examStartTime) return;
  const elapsed = Math.floor((Date.now() - examStartTime) / 1000);
  const remaining = EXAM_CONFIG.timeMinutes * 60 - elapsed;
  if (remaining <= 0) {
    stopTimer();
    finishExam();
    return;
  }
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  const timerEl = document.getElementById('exam-timer');
  if (timerEl) timerEl.textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a}

function render() {
  const area = document.getElementById('question-area');
  const stats = document.getElementById('header-stats');
  const total = QS.length;
  const done = wrongIds.length;

  if (examMode) {
    stats.textContent = `共${total}题 | 考试中 (${questions.length}题)`;
    document.getElementById('chapter-filter').disabled = true;
  } else {
    stats.textContent = `共${total}题 | 错题${done}题`;
    document.getElementById('chapter-filter').disabled = false;
  }

  if (questions.length === 0) {
    area.innerHTML = '<div class="empty-state">' + (wrongMode ? '🎉 错题本已清空！' : examMode ? '📋 考试配置有误' : '📭 没有符合条件的题目') + '</div>';
    document.getElementById('progress-fill').style.width = '0%';
    return;
  }

  const q = questions[currentIndex];
  const pct = ((currentIndex + 1) / questions.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';

  let reward = q._examScore ? ` (${q._examScore}分)` : '';

  let html = `<div class="q-card" id="qcard-${q.id}">`;

  if (examMode) {
    html += `<div class="q-meta">
      📋 第 ${currentIndex+1}/${questions.length} 题
      <span id="exam-timer" class="exam-timer">⏱ ${EXAM_CONFIG.timeMinutes}:00</span>
    </div>`;
    html += `<div class="q-text">${q._examLabel}${reward}：${q.question}</div>`;
  } else {
    html += `<div class="q-meta">#${q.id} · ${q.chapter||''} · ${q.type}题 · ${currentIndex+1}/${questions.length}</div>`;
    html += `<div class="q-text">${q.question}</div>`;
  }

  html += `<div class="q-options" id="options-${q.id}">`;
  q.options.forEach(o => {
    html += `<div class="q-option" data-val="${o.label}" onclick="selectOpt(${q.id},'${o.label}')"><span class="label">${o.label}</span> ${o.text}</div>`;
  });
  html += '</div>';
  html += `<button class="q-btn submit" id="submit-${q.id}" onclick="submitAnswer(${q.id})">查看答案</button>`;
  html += `<div class="q-result" id="result-${q.id}"></div>`;
  html += '</div>';

  window['_selected_' + q.id] = null;
  area.innerHTML = html;
}

function selectOpt(qid, val) {
  const q = QS.find(x => x.id === qid) || questions.find(x => x.id === qid);
  if (!q) return;
  const opts = document.querySelectorAll(`#options-${qid} .q-option`);
  window['_selected_' + qid] = val;
  opts.forEach(o => {
    o.classList.toggle('active', o.dataset.val === val);
    o.style.borderColor = o.dataset.val === val ? '#27ae60' : '';
    o.style.background = o.dataset.val === val ? '#e8f8ef' : '';
  });
}

function submitAnswer(qid) {
  const q = QS.find(x => x.id === qid) || questions.find(x => x.id === qid);
  if (!q) return;
  const opts = document.querySelectorAll(`#options-${qid} .q-option`);
  const btn = document.getElementById(`submit-${qid}`);
  const result = document.getElementById(`result-${qid}`);
  const selected = window['_selected_' + qid];

  if (!selected) {
    result.className = 'q-result show wrong';
    result.textContent = '⚠️ 请先选择一个答案';
    return;
  }

  btn.style.display = 'none';
  opts.forEach(o => o.classList.add('disabled'));

  const correct = selected === q.answer;

  opts.forEach(o => {
    if (o.dataset.val === q.answer) o.classList.add('correct');
    if (o.dataset.val === selected && !correct) o.classList.add('wrong');
  });

  if (examMode) {
    examAnswers.push({ id: q.id, correct, score: q._examScore || 0 });
  }

  result.className = `q-result show ${correct ? 'correct' : 'wrong'}`;
  result.textContent = correct ? '✅ 回答正确！' : `❌ 正确答案：${q.answer}`;

  if (!correct && !wrongIds.includes(q.id)) {
    wrongIds.push(q.id);
    localStorage.setItem('enWrongIds', JSON.stringify(wrongIds));
    updateStats();
  }

  const card = document.getElementById(`qcard-${qid}`);
  if (!card) return;

  if (currentIndex < questions.length - 1) {
    const nbtn = document.createElement('button');
    nbtn.className = 'q-btn next';

    if (correct) {
      nbtn.textContent = '⏳ 正确！3秒后自动跳转...';
      nbtn.className = 'q-btn next-auto';
      nbtn.disabled = true;
      card.appendChild(nbtn);
      setTimeout(() => {
        if (nbtn.parentNode) {
          currentIndex++;
          if (examMode && currentIndex >= questions.length) {
            finishExam();
          } else {
            render();
          }
        }
      }, 3000);
    } else {
      nbtn.textContent = '下一题 →';
      nbtn.onclick = () => { currentIndex++; render(); };
      card.appendChild(nbtn);
    }
  } else {
    if (examMode) {
      const nbtn = document.createElement('button');
      nbtn.className = 'q-btn return-btn';
      nbtn.textContent = '📊 查看考试结果';
      nbtn.onclick = finishExam;
      card.appendChild(nbtn);
    } else {
      const nbtn = document.createElement('button');
      nbtn.className = 'q-btn next';
      nbtn.textContent = wrongMode ? '🎉 错题已刷完' : '🎉 全部完成！';
      nbtn.onclick = () => {
        if (wrongMode) { wrongMode = false; document.getElementById('wb-btn').classList.remove('active'); }
        loadQuestions();
      };
      card.appendChild(nbtn);
    }
  }
}

function finishExam() {
  stopTimer();
  examMode = false;
  const total = questions.length;
  const correct = examAnswers.filter(a => a.correct).length;
  const score = examAnswers.reduce((s, a) => s + (a.correct ? a.score : 0), 0);
  const maxScore = questions.reduce((s, q) => s + (q._examScore || 0), 0);
  const pct = total > 0 ? Math.round(score / maxScore * 100) : 0;

  const wrongItems = examAnswers.filter(a => !a.correct);

  const area = document.getElementById('question-area');
  document.getElementById('progress-fill').style.width = '100%';

  let html = `
    <div class="score-card">
      <div class="score-num">${score}/${maxScore}</div>
      <div class="score-label">总分</div>
      <div class="score-detail">正确 ${correct}/${total} 题 · 得分率 ${pct}%</div>
    </div>
    <div class="q-card">
      <div style="font-size:13px;margin-bottom:12px;color:#999;">点错题查看正确答案</div>
  `;

  questions.forEach((q, i) => {
    const ans = examAnswers[i];
    if (!ans) return;
    const isCorr = ans.correct;
    html += `<div style="padding:10px 4px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="toggleExamDetail(${i})">
      <span style="font-size:16px;">${isCorr ? '✅' : '❌'}</span>
      <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${q.question.replace(/<[^>]*>/g,'').substring(0,60)}</span>
      <span style="font-size:12px;color:#999;">${isCorr ? '+' + (q._examScore||0) : '0'}分</span>
    </div>
    <div id="exam-detail-${i}" style="display:none;padding:8px 4px 12px 26px;font-size:13px;background:#fafafa;border-radius:6px;margin-bottom:4px;">
      <div style="color:#999;">正确答案：${q.answer}</div>
      <div style="color:${isCorr?'#27ae60':'#e74c3c'};">你的答案：${isCorr?'正确':'错误'}</div>
    </div>`;
  });

  html += '</div>';
  html += `<button class="q-btn return-btn" onclick="backToShuati()" style="margin-top:14px;">⬅ 返回刷题模式</button>`;
  area.innerHTML = html;
}

function toggleExamDetail(i) {
  const el = document.getElementById('exam-detail-' + i);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function backToShuati() {
  document.getElementById('mode-select').value = 'shuati';
  examMode = false;
  loadQuestions();
}

function toggleWrongBook() {
  wrongMode = !wrongMode;
  document.getElementById('wb-btn').classList.toggle('active', wrongMode);
  if (!examMode) loadQuestions();
}

document.getElementById('chapter-filter').addEventListener('change', () => { if (!examMode) loadQuestions(); });
document.getElementById('mode-select').addEventListener('change', () => loadQuestions());

function updateStats() {
  document.getElementById('header-stats').textContent = `共${QS.length}题 | 错题${wrongIds.length}题`;
}

if (QS.length > 0) init();
</script>
</body>
</html>
